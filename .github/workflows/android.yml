name: Android APK Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bootstrap Full Android Project Structures
        run: |
          mkdir -p app/src/main/java/com/atlas/thetagen
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          echo "include ':app'" > settings.gradle

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.atlas.thetagen'
              compileSdk 34
              defaultConfig {
                  applicationId "com.atlas.thetagen"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core-ktx:1.12.0'
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Theta Generator"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<resources><string name="app_name">Theta Generator</string></resources>' > app/src/main/res/values/strings.xml
          echo '<resources><style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"/></resources>' > app/src/main/res/values/styles.xml

          if [ -f MainActivity.kt ]; then
            mv MainActivity.kt app/src/main/java/com/atlas/thetagen/MainActivity.kt
          fi

      - name: Generate Gradle Wrapper Automatically
        run: |
          npm install -g kwb || true
          gradle wrapper --gradle-version 8.2

      - name: Build Android APK
        run: ./gradlew assembleDebug

      - name: Upload APK Download Link
        uses: actions/upload-artifact@v4
        with:
          name: ThetaGenerator-APK
          path: app/build/outputs/apk/debug/app-debug.apk
