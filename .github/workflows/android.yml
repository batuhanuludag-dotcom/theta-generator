name: Android APK Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Android Project
        run: |
          mkdir -p app/src/main/java/com/atlas/thetagen
          mkdir -p app/src/main/res/values
          
          # build.gradle oluşturma
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # settings.gradle oluşturma
          echo "include ':app'" > settings.gradle

          # app/build.gradle oluşturma
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.atlas.thetagen'
              compileSdk 34
              defaultConfig {
                  applicationId "com.atlas.thetagen"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          EOF

          # AndroidManifest.xml oluşturma
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Theta Generator"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # strings.xml ve styles.xml oluşturma (Hata önleme amaçlı)
          echo '<resources><string name="app_name">Theta Generator</string></resources>' > app/src/main/res/values/strings.xml
          echo '<resources><style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"/></resources>' > app/src/main/res/values/styles.xml

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2

      - name: Move Source Code
        run: |
          mv MainActivity.kt app/src/main/java/com/atlas/thetagen/MainActivity.kt || true

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK Download Link
        uses: actions/upload-artifact@v3
        with:
          name: ThetaGenerator-APK
          path: app/build/outputs/apk/debug/app-debug.apk
